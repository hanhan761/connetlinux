name: validate-yun-skill

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile and test control plane
        run: |
          python -m py_compile scripts/yunctl.py
          python -m unittest discover -s tests -v
          python scripts/yunctl.py --help
          bash -n scripts/yun_job_runner.sh

      - name: Test isolated registry lifecycle
        run: |
          registry_root=$(mktemp -d)
          trap 'rm -rf -- "$registry_root"' EXIT
          export YUN_TARGETS_FILE="$registry_root/targets.json"
          python scripts/yunctl.py init
          python scripts/yunctl.py init
          test "$(python scripts/yunctl.py targets)" = "no targets registered"
          test "$(stat -c %a "$YUN_TARGETS_FILE")" = "600"

      - name: Test Ed25519 key lifecycle
        if: matrix.python-version == '3.13'
        run: |
          key_root=$(mktemp -d)
          trap 'rm -rf -- "$key_root"' EXIT
          python scripts/yunctl.py keygen ci-worker \
            --directory "$key_root" \
            --automation-key \
            --confirm-unencrypted
          test -s "$key_root/yun_ci-worker_ed25519"
          test -s "$key_root/yun_ci-worker_ed25519.pub"
          test "$(stat -c %a "$key_root/yun_ci-worker_ed25519")" = "600"
          ssh-keygen -lf "$key_root/yun_ci-worker_ed25519.pub" -E sha256
